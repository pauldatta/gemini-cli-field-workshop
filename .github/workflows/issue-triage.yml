name: '🏷️ Issue Triage'

on:
  issues:
    types:
      - 'opened'
      - 'reopened'
  issue_comment:
    types:
      - 'created'
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to triage'
        required: true
        type: 'number'

concurrency:
  group: '${{ github.workflow }}-${{ github.event.issue.number || github.event.inputs.issue_number }}'
  cancel-in-progress: true

permissions:
  contents: 'read'
  issues: 'write'

jobs:
  triage-issue:
    if: |-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issues' ||
        (
          github.event_name == 'issue_comment' &&
          contains(github.event.comment.body, '/triage') &&
          (github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'MEMBER' || github.event.comment.author_association == 'COLLABORATOR')
        )
      )
    timeout-minutes: 3
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Get issue data (manual trigger)'
        id: 'get_issue_data'
        if: github.event_name == 'workflow_dispatch'
        uses: 'actions/github-script@v9'
        with:
          script: |
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.inputs.issue_number }},
            });
            core.setOutput('title', issue.title);
            core.setOutput('body', issue.body || '');

      - name: 'Skip if already triaged'
        id: 'check_labels'
        uses: 'actions/github-script@v9'
        env:
          ISSUE_NUMBER: '${{ github.event.issue.number || github.event.inputs.issue_number }}'
        with:
          script: |
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(process.env.ISSUE_NUMBER),
            });
            const hasArea = issue.labels.some(l => l.name.startsWith('area/'));
            if (hasArea && github.event_name !== 'workflow_dispatch') {
              core.info('Issue already has area/ label. Skipping.');
              core.setOutput('skip', 'true');
            } else {
              core.setOutput('skip', 'false');
            }

      - name: 'Run Gemini Issue Analysis'
        if: steps.check_labels.outputs.skip != 'true'
        uses: 'google-github-actions/run-gemini-cli@v0'
        id: 'gemini_analysis'
        env:
          GITHUB_TOKEN: '' # Do not pass auth to model — untrusted input
          GEMINI_CLI_TRUST_WORKSPACE: 'true'
          ISSUE_TITLE: >-
            ${{ github.event_name == 'workflow_dispatch' && steps.get_issue_data.outputs.title || github.event.issue.title }}
          ISSUE_BODY: >-
            ${{ github.event_name == 'workflow_dispatch' && steps.get_issue_data.outputs.body || github.event.issue.body }}
        with:
          gemini_api_key: '${{ secrets.GEMINI_API_KEY }}'
          settings: |-
            {
              "maxSessionTurns": 5,
              "coreTools": ["run_shell_command(echo)"]
            }
          prompt: |-
            ## Role

            You are an issue triage assistant for gemini-cli-field-workshop, a public workshop repository teaching enterprise developers to use Gemini CLI.

            The workshop contains these modules:
            - Environment Setup (setup.md, setup.sh)
            - SDLC Productivity (sdlc-productivity.md)
            - Legacy Modernization (legacy-modernization.md)
            - DevOps Orchestration (devops-orchestration.md)
            - Advanced Patterns (advanced-patterns.md)
            - Facilitator Guide (facilitator-guide.md)
            - Cheatsheet (cheatsheet.md)
            - Korean translations (ko/ directory)

            ## Steps
            1. Review the issue title: ${{ env.ISSUE_TITLE }}
            2. Review the issue body: ${{ env.ISSUE_BODY }}
            3. Select exactly ONE type label, exactly ONE area label, and exactly ONE priority label.
            4. Output your selection as JSON and nothing else.

            ## Output Format
            {"type": "type/bug", "area": "area/content", "priority": "priority/medium"}

            ## Type Labels
            - type/bug: Something isn't working (broken links, setup errors, incorrect code samples)
            - type/improvement: Enhancement or new content suggestion
            - type/feedback: Workshop delivery feedback from participants
            - type/question: A question about usage or workshop content

            ## Area Labels
            - area/setup: setup.sh, installation, authentication, environment issues
            - area/content: Workshop docs, use case walkthroughs, exercise instructions
            - area/hooks: Hook samples, settings.json, policy.toml configurations
            - area/facilitator: Facilitator guide, delivery timing, audience targeting
            - area/cicd: GitHub Actions workflows, headless mode examples
            - area/docsify: Docsify site rendering, navigation, search, index.html
            - area/i18n: Translations, Korean content in ko/ directory, language parity
            - area/unknown: Does not clearly fit any other area

            ## Priority Labels
            - priority/high: Blocks workshop delivery (setup fails, critical content wrong)
            - priority/medium: Degrades experience but has workarounds
            - priority/low: Nice-to-have improvements, cosmetic issues

            ## Guidelines
            - Output ONLY valid JSON. No explanation, no markdown, no extra text.
            - If unsure about area, use area/unknown.
            - If unsure about type, use type/question.
            - If unsure about priority, use priority/medium.

      - name: 'Apply Labels'
        if: steps.check_labels.outputs.skip != 'true' && steps.gemini_analysis.outputs.summary != ''
        id: 'apply_labels'
        uses: 'actions/github-script@v9'
        env:
          ISSUE_NUMBER: '${{ github.event.issue.number || github.event.inputs.issue_number }}'
          GEMINI_OUTPUT: '${{ steps.gemini_analysis.outputs.summary }}'
        with:
          script: |
            const raw = process.env.GEMINI_OUTPUT;
            core.info(`Raw Gemini output: ${raw}`);

            let parsed;
            try {
              parsed = JSON.parse(raw);
            } catch (e1) {
              // Try extracting from markdown code block
              const match = raw.match(/```(?:json)?\s*([\s\S]*?)\s*```/);
              if (match) {
                try { parsed = JSON.parse(match[1].trim()); } catch (e2) {}
              }
              // Try finding a raw JSON object
              if (!parsed) {
                const objMatch = raw.match(/(\{[\s\S]*"type"[\s\S]*"area"[\s\S]*\})/);
                if (objMatch) {
                  try { parsed = JSON.parse(objMatch[0]); } catch (e3) {}
                }
              }
            }

            if (!parsed || !parsed.type || !parsed.area) {
              core.warning(`Could not parse triage output. Applying fallback labels.`);
              parsed = { type: 'type/question', area: 'area/unknown', priority: 'priority/medium' };
            }

            const validTypes = ['type/bug', 'type/improvement', 'type/feedback', 'type/question'];
            const validAreas = ['area/setup', 'area/content', 'area/hooks', 'area/facilitator', 'area/cicd', 'area/docsify', 'area/i18n', 'area/unknown'];
            const validPriorities = ['priority/high', 'priority/medium', 'priority/low'];

            const typeLabel = validTypes.includes(parsed.type) ? parsed.type : 'type/question';
            const areaLabel = validAreas.includes(parsed.area) ? parsed.area : 'area/unknown';
            const priorityLabel = validPriorities.includes(parsed.priority) ? parsed.priority : 'priority/medium';

            const labels = [typeLabel, areaLabel, priorityLabel];

            // Remove status/triage once classified
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt(process.env.ISSUE_NUMBER),
                name: 'status/triage'
              });
            } catch (e) {
              core.info('status/triage label not present, skipping removal.');
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(process.env.ISSUE_NUMBER),
              labels: labels
            });
            core.info(`Applied labels: ${labels.join(', ')}`);

            // Export for downstream steps
            core.setOutput('type', typeLabel);
            core.setOutput('area', areaLabel);
            core.setOutput('priority', priorityLabel);

      - name: 'Post triage acknowledgment'
        if: steps.check_labels.outputs.skip != 'true' && steps.apply_labels.outputs.type != '' && github.event_name != 'issue_comment'
        uses: 'actions/github-script@v9'
        env:
          ISSUE_NUMBER: '${{ github.event.issue.number || github.event.inputs.issue_number }}'
          TYPE_LABEL: '${{ steps.apply_labels.outputs.type }}'
          AREA_LABEL: '${{ steps.apply_labels.outputs.area }}'
          PRIORITY_LABEL: '${{ steps.apply_labels.outputs.priority }}'
        with:
          script: |
            const type = process.env.TYPE_LABEL;
            const area = process.env.AREA_LABEL;
            const priority = process.env.PRIORITY_LABEL;

            const typeEmoji = {
              'type/bug': '🐛',
              'type/improvement': '💡',
              'type/feedback': '📝',
              'type/question': '❓'
            };
            const priorityEmoji = {
              'priority/high': '🔴',
              'priority/medium': '🟡',
              'priority/low': '🟢'
            };

            const emoji = typeEmoji[type] || '📋';
            const pEmoji = priorityEmoji[priority] || '🟡';

            const body = [
              `${emoji} **Auto-triaged** by Gemini CLI`,
              '',
              `| Field | Value |`,
              `|:------|:------|`,
              `| Type | \`${type}\` |`,
              `| Area | \`${area}\` |`,
              `| Priority | ${pEmoji} \`${priority}\` |`,
              '',
              '_This classification was performed automatically. A maintainer will review shortly._',
              '_If this seems wrong, a maintainer can comment `/triage` to re-run._'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(process.env.ISSUE_NUMBER),
              body: body
            });
