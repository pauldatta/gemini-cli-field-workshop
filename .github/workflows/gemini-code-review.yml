name: '🤖 Gemini Code Review'

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Workshop Content Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Review PR with Gemini CLI
        uses: google-github-actions/run-gemini-cli@v1
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            You are a senior technical reviewer for the Gemini CLI Field Workshop,
            an enterprise developer enablement curriculum. Review this pull request
            with the following workshop-specific criteria:

            ## Content Quality
            - Are code examples syntactically correct and copy-paste ready?
            - Do code blocks use the correct fence language (bash, json, toml, markdown)?
            - Are CLI commands accurate for the current Gemini CLI version?
            - Do instructions follow a progressive difficulty curve?

            ## Structural Integrity
            - Does _sidebar.md stay aligned with any new/renamed doc files?
            - Are all internal markdown links valid (no broken cross-references)?
            - Do new docs have proper heading hierarchy (single H1, logical H2/H3)?

            ## Internationalization (i18n)
            - If docs/*.md source files changed, flag that translations in docs/{ko,id,zh}/
              will need re-generation via `make translate L=<lang>`
            - If _sidebar.md changed, flag that localized sidebars need regeneration
            - Check that code blocks in translated files are NOT translated (must match English)

            ## Workshop Standards
            - GEMINI.md references should use the project's established patterns
            - Agent definitions must have YAML frontmatter (---)
            - Hook scripts must be valid bash (#!/usr/bin/env bash)
            - Config samples (settings.json, policy.toml) must be valid syntax
            - Never use deprecated models (gemini-1.5-flash, gemini-1.5-pro)

            ## Security
            - No hardcoded API keys, tokens, or credentials
            - No real project IDs or service account emails
            - policy.toml deny rules should not be weakened

            Post findings as inline PR review comments. For each issue include:
            - The specific file and line
            - A clear description of the problem
            - A concrete fix suggestion

            If the PR looks good, post a single approving summary of what was checked.
