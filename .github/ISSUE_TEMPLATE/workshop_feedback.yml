name: 'Workshop Feedback'
description: 'Share feedback about the workshop content, exercises, or delivery experience'
labels:
  - 'type/feedback'
  - 'status/triage'
body:
  - type: 'markdown'
    attributes:
      value: |-
        > [!IMPORTANT]
        > Thanks for your feedback! This helps us improve the workshop for future sessions.

  - type: 'dropdown'
    id: 'module'
    attributes:
      label: 'Which module is this about?'
      options:
        - '⚙️ Environment Setup'
        - '1. SDLC Productivity'
        - '2. Legacy Modernization'
        - '3. DevOps Orchestration'
        - '🚀 Advanced Patterns'
        - 'General / Multiple'
    validations:
      required: true

  - type: 'textarea'
    id: 'feedback'
    attributes:
      label: 'Your feedback'
      description: 'What worked well? What could be improved?'
    validations:
      required: true

  - type: 'dropdown'
    id: 'difficulty'
    attributes:
      label: 'Difficulty level'
      description: 'How did you find the workshop difficulty?'
      options:
        - Too easy
        - Just right
        - Slightly challenging
        - Too difficult

  - type: 'dropdown'
    id: 'language'
    attributes:
      label: 'Which language version did you use?'
      options:
        - English (default)
        - 한국어 (Korean)
        - Other / N/A

  - type: 'textarea'
    id: 'suggestions'
    attributes:
      label: 'Suggestions for improvement'
      description: 'Any specific changes you would recommend?'
