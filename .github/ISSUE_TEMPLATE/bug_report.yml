name: 'Bug Report'
description: 'Report an issue with workshop content, setup scripts, or sample code'
labels:
  - 'type/bug'
  - 'status/triage'
body:
  - type: 'markdown'
    attributes:
      value: |-
        > [!IMPORTANT]
        > Thanks for reporting this issue!
        >
        > Please search **[existing issues](https://github.com/pauldatta/gemini-cli-field-workshop/issues)** to see if this has already been reported.

  - type: 'textarea'
    id: 'problem'
    attributes:
      label: 'What happened?'
      description: 'A clear description of the issue you encountered.'
    validations:
      required: true

  - type: 'textarea'
    id: 'expected'
    attributes:
      label: 'What did you expect to happen?'
    validations:
      required: true

  - type: 'textarea'
    id: 'reproduce'
    attributes:
      label: 'Steps to reproduce'
      value: |-
        1. Run `./setup.sh`
        2. Navigate to '...'
        3. Run prompt '...'
        4. See error

  - type: 'dropdown'
    id: 'area'
    attributes:
      label: 'Which area is affected?'
      options:
        - Setup / Installation
        - Workshop content (docs)
        - Sample code / hooks
        - Exercise PRDs
        - Docsify site
        - Other
    validations:
      required: true

  - type: 'dropdown'
    id: 'os'
    attributes:
      label: 'Operating System'
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: 'textarea'
    id: 'additional-context'
    attributes:
      label: 'Additional context'
      description: 'Add terminal output, screenshots, or Gemini CLI version info.'
