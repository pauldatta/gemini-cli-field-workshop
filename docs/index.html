<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gemini CLI Workshop</title>
  <meta name="description" content="Hands-on workshop for enterprise developers to master Gemini CLI for agentic coding, modernization, and DevOps automation.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link
    rel="stylesheet"
    href="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/style.min.css"
    title="docsify-darklight-theme"
    type="text/css"
  />
  <style>
    .sidebar-nav li a {
      font-size: 14px;
    }
    .markdown-section {
      max-width: 900px;
    }
    .markdown-section table {
      display: table;
      width: 100%;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Gemini CLI Workshop',
      repo: 'pauldatta/gemini-cli-field-workshop',
      loadSidebar: true,
      loadNavbar: true,
      subMaxLevel: 3,
      fallbackLanguages: ['en'],
      alias: {
        // Specific overrides MUST come before the catch-all
        '/([a-z]{2})/_sidebar.md':  '/$1/_sidebar.md',
        '/([a-z]{2})/_navbar.md':   '/_navbar.md',
        // Fallback: paths without their own sidebar get the root one
        '/.*/_sidebar.md':          '/_sidebar.md'
      },
      search: {
        placeholder: 'Search workshop...',
        noData: 'No results.',
        depth: 3
      },
      auto2top: true,
      coverpage: false,
      notFoundPage: true,
      darklightTheme: {
        defaultTheme: 'light',
        siteFont: 'Source Sans Pro, Helvetica Neue, Arial, sans-serif',
        codeFontFamily: 'Roboto Mono, Monaco, courier, monospace',
        bodyFontSize: '15px',
        dark: {
          accent: '#8ab4f8',
          textColor: '#c9d1d9',
          toogleBackground: '#1a1a2e',
          background: '#0d1117',
          codeBackground: '#161b22',
          codeTextColor: '#c9d1d9',
          borderColor: '#30363d',
          blockQuoteColor: '#8b949e',
          highlightColor: '#58a6ff',
          sidebarSublink: '#8b949e',
          codeTypeColor: '#8ab4f8',
          coverBackground: 'linear-gradient(to left bottom, hsl(220, 60%, 20%), hsl(220, 40%, 10%))',
          toogleImage: 'url(https://cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/icons/moon.svg)'
        },
        light: {
          accent: '#4285f4',
          textColor: '#2c3e50',
          toogleBackground: '#e8eaed',
          background: '#ffffff',
          codeBackground: '#f6f8fa',
          codeTextColor: '#36464e',
          borderColor: '#e1e4e8',
          blockQuoteColor: '#6a737d',
          highlightColor: '#1a73e8',
          sidebarSublink: '#505d68',
          codeTypeColor: '#4285f4',
          coverBackground: 'linear-gradient(to left bottom, hsl(220, 60%, 92%), hsl(220, 40%, 98%))',
          toogleImage: 'url(https://cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/icons/sun.svg)'
        }
      },
      plugins: [
        function(hook, vm) {
          hook.beforeEach(function(content) {
            // Docsify plugin to fix i18n relative links in markdown.
            // When on a language route (e.g. /ko/), it transforms links 
            // pointing to other markdown pages to include the prefix.
            var path = vm.route.path;
            var langMatch = path.match(/^\/([a-z]{2})\//);
            if (langMatch) {
              var lang = langMatch[1];
              // Match markdown links: [text](link.md)
              // Only replace if it doesn't already start with http, /, or the language prefix
              return content.replace(/\[([^\]]+)\]\((?!http|\/|#)[^\)]+\.md\)/g, function(match) {
                return match.replace(/\((?!http|\/|#)([^\)]+)\.md\)/, '(/' + lang + '/$1.md)');
              });
            }
            return content;
          });
        }
      ]
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-toml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>
  <script>
    // Language router — Docsify navbar strips # from links, so we intercept
    // clicks on language routes (/xx/) and navigate via hash instead.
    document.addEventListener('click', function(e) {
      var link = e.target.closest('a');
      if (!link) return;
      
      // Only intercept links from the navbar (language switcher)
      if (!link.closest('.app-nav')) return;

      var href = link.getAttribute('href');
      if (!href) return;
      
      // Match language links like #/ko/ or the English root #/
      // Docsify might have already prefixed it with #
      var cleanHref = href.replace(/^#/, '');

      if (cleanHref === '/' || /^\/[a-z]{2}\/$/.test(cleanHref)) {
        e.preventDefault();
        e.stopPropagation(); // Stop docsify from handling it
        
        // Get the current path without the hash
        var currentPath = window.location.hash.replace(/^#/, '');
        if (!currentPath) currentPath = '/';
        
        // Strip out any existing language prefix (e.g. /ko/) from the current path
        var pathWithoutLang = currentPath.replace(/^\/[a-z]{2}\//, '/');
        
        // If switching to English (cleanHref === '/'), just use the path
        // If switching to a language, prepend the language prefix
        var newHash = cleanHref === '/' ? pathWithoutLang : cleanHref.replace(/\/$/, '') + pathWithoutLang;
        
        // Ensure we don't end up with duplicate slashes
        newHash = newHash.replace(/\/\//g, '/');
        
        // Default to root if empty
        if (!newHash) newHash = '/';

        window.location.hash = '#' + newHash;
      }
    }, true); // Use capture phase to run before docsify
  </script>
</body>
</html>
