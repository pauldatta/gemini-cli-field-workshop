<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gemini CLI Workshop</title>
  <meta name="description" content="Hands-on workshop for enterprise developers to master Gemini CLI for agentic coding, modernization, and DevOps automation.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">
  <style>
    :root {
      --theme-color: #4285f4;
    }
    .sidebar-nav li a {
      font-size: 14px;
    }
    .markdown-section {
      max-width: 900px;
    }
    .markdown-section table {
      display: table;
      width: 100%;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '🤖 Gemini CLI Workshop',
      repo: 'pauldatta/gemini-cli-field-workshop',
      loadSidebar: true,
      subMaxLevel: 3,
      search: {
        placeholder: 'Search workshop...',
        noData: 'No results.',
        depth: 3
      },
      auto2top: true,
      coverpage: false,
      notFoundPage: true
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-toml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>
</body>
</html>
