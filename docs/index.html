<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gemini CLI Workshop</title>
  <meta name="description" content="Hands-on workshop for enterprise developers to master Gemini CLI for agentic coding, modernization, and DevOps automation.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">
  <style>
    /* ── Light theme (default) ─────────────────────────── */
    :root {
      --theme-color: #4285f4;
      --text-color: #2c3e50;
      --bg-color: #ffffff;
      --sidebar-bg: #f8f9fa;
      --sidebar-border: #e8eaed;
      --sidebar-name-color: #1a73e8;
      --code-bg: #f6f8fa;
      --code-text: #36464e;
      --code-border: #e1e4e8;
      --blockquote-bg: #f1f3f4;
      --blockquote-border: #4285f4;
      --blockquote-text: #5f6368;
      --table-head-bg: #f1f3f4;
      --table-border: #dadce0;
      --table-stripe: #f8f9fa;
      --link-color: #1a73e8;
      --link-hover: #174ea6;
      --heading-color: #1a1a2e;
      --tip-bg: #e8f5e9;
      --tip-border: #34a853;
      --warning-bg: #fff3e0;
      --warning-border: #ea8600;
      --highlight-bg: #fff9c4;
      --toggle-icon: '🌙';
    }

    /* ── Dark theme ────────────────────────────────────── */
    [data-theme="dark"] {
      --theme-color: #8ab4f8;
      --text-color: #c9d1d9;
      --bg-color: #0d1117;
      --sidebar-bg: #161b22;
      --sidebar-border: #30363d;
      --sidebar-name-color: #8ab4f8;
      --code-bg: #1c2128;
      --code-text: #e6edf3;
      --code-border: #30363d;
      --blockquote-bg: #161b22;
      --blockquote-border: #8ab4f8;
      --blockquote-text: #8b949e;
      --table-head-bg: #1c2128;
      --table-border: #30363d;
      --table-stripe: #161b22;
      --link-color: #58a6ff;
      --link-hover: #79c0ff;
      --heading-color: #e6edf3;
      --tip-bg: #0d2818;
      --tip-border: #2ea043;
      --warning-bg: #2a1f00;
      --warning-border: #d29922;
      --highlight-bg: #2a2000;
      --toggle-icon: '☀️';
    }

    /* ── Base overrides ────────────────────────────────── */
    body {
      background: var(--bg-color) !important;
      color: var(--text-color) !important;
    }

    /* Sidebar */
    .sidebar {
      background: var(--sidebar-bg) !important;
      border-right: 1px solid var(--sidebar-border) !important;
    }
    .sidebar-nav li a {
      font-size: 14px;
      color: var(--text-color) !important;
    }
    .sidebar-nav li a:hover,
    .sidebar-nav li a.active {
      color: var(--theme-color) !important;
    }
    .app-name-link {
      color: var(--sidebar-name-color) !important;
      font-weight: 700;
    }

    /* Main content */
    .markdown-section {
      max-width: 900px;
      color: var(--text-color) !important;
    }

    /* Headings */
    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3,
    .markdown-section h4,
    .markdown-section h5,
    .markdown-section h6 {
      color: var(--heading-color) !important;
    }
    .markdown-section h1 {
      border-bottom: 2px solid var(--theme-color);
      padding-bottom: 0.3em;
    }
    .markdown-section h2 {
      border-bottom: 1px solid var(--sidebar-border);
      padding-bottom: 0.25em;
    }
    /* Dark mode headings — extra bright for contrast */
    [data-theme="dark"] .markdown-section h1,
    [data-theme="dark"] .markdown-section h2,
    [data-theme="dark"] .markdown-section h3,
    [data-theme="dark"] .markdown-section h4,
    [data-theme="dark"] .markdown-section h5,
    [data-theme="dark"] .markdown-section h6 {
      color: #f0f6fc !important;
    }
    [data-theme="dark"] .markdown-section h3 {
      color: #d2a8ff !important;
    }

    /* Links */
    .markdown-section a {
      color: var(--link-color) !important;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }
    .markdown-section a:hover {
      color: var(--link-hover) !important;
      border-bottom-color: var(--link-hover);
    }

    /* Code blocks */
    .markdown-section pre {
      background: var(--code-bg) !important;
      border: 1px solid var(--code-border) !important;
      border-radius: 8px !important;
      padding: 1em !important;
    }
    .markdown-section pre > code {
      color: var(--code-text) !important;
      background: transparent !important;
    }
    .markdown-section code {
      background: var(--code-bg) !important;
      color: var(--code-text) !important;
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 0.88em;
      border: 1px solid var(--code-border);
    }
    .markdown-section pre > code {
      border: none;
      padding: 0;
    }

    /* Syntax highlighting — dark mode overrides */
    [data-theme="dark"] .token.comment,
    [data-theme="dark"] .token.prolog { color: #8b949e; }
    [data-theme="dark"] .token.keyword { color: #ff7b72; }
    [data-theme="dark"] .token.string { color: #a5d6ff; }
    [data-theme="dark"] .token.number { color: #79c0ff; }
    [data-theme="dark"] .token.function { color: #d2a8ff; }
    [data-theme="dark"] .token.boolean { color: #79c0ff; }
    [data-theme="dark"] .token.operator { color: #ff7b72; }
    [data-theme="dark"] .token.punctuation { color: #c9d1d9; }
    [data-theme="dark"] .token.property { color: #7ee787; }
    [data-theme="dark"] .token.builtin { color: #ffa657; }
    [data-theme="dark"] .token.attr-name { color: #7ee787; }
    [data-theme="dark"] .token.attr-value { color: #a5d6ff; }

    /* Tables */
    .markdown-section table {
      display: table;
      width: 100%;
      border-collapse: collapse;
    }
    .markdown-section th {
      background: var(--table-head-bg) !important;
      color: var(--heading-color) !important;
      font-weight: 600;
      border: 1px solid var(--table-border) !important;
      padding: 10px 14px;
    }
    .markdown-section td {
      border: 1px solid var(--table-border) !important;
      padding: 8px 14px;
      color: var(--text-color) !important;
    }
    .markdown-section tr:nth-child(even) {
      background: var(--table-stripe) !important;
    }
    .markdown-section tr:hover {
      background: var(--code-bg) !important;
    }

    /* Blockquotes */
    .markdown-section blockquote {
      background: var(--blockquote-bg) !important;
      border-left: 4px solid var(--blockquote-border) !important;
      color: var(--blockquote-text) !important;
      padding: 12px 20px;
      border-radius: 0 6px 6px 0;
      margin: 1em 0;
    }
    .markdown-section blockquote p {
      color: var(--blockquote-text) !important;
    }
    .markdown-section blockquote a {
      color: var(--link-color) !important;
    }

    /* Tip/Warning boxes (bold first line in blockquotes) */
    .markdown-section blockquote > p:first-child strong {
      color: var(--theme-color) !important;
    }

    /* Images — subtle rounding */
    .markdown-section img {
      border-radius: 8px;
      max-width: 100%;
    }

    /* Strong text */
    .markdown-section strong {
      color: var(--heading-color) !important;
    }

    /* ── Navbar ─────────────────────────────────────────── */
    .app-nav {
      display: flex !important;
      align-items: center;
      gap: 8px;
    }
    .app-nav a {
      color: var(--text-color) !important;
    }
    .app-nav a:hover {
      color: var(--theme-color) !important;
    }

    /* Theme toggle button in navbar */
    #theme-toggle {
      cursor: pointer;
      background: var(--code-bg);
      border: 1px solid var(--code-border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 14px;
      color: var(--text-color);
      transition: all 0.3s ease;
      white-space: nowrap;
      margin-left: 4px;
    }
    #theme-toggle:hover {
      border-color: var(--theme-color);
      background: var(--blockquote-bg);
    }

    /* ── Copy button polish ─────────────────────────────── */
    .docsify-copy-code-button {
      font-size: 12px !important;
      border-radius: 4px !important;
    }

    /* ── Scrollbar (dark mode) ──────────────────────────── */
    [data-theme="dark"] ::-webkit-scrollbar { width: 8px; }
    [data-theme="dark"] ::-webkit-scrollbar-track { background: var(--bg-color); }
    [data-theme="dark"] ::-webkit-scrollbar-thumb {
      background: #30363d;
      border-radius: 4px;
    }
    [data-theme="dark"] ::-webkit-scrollbar-thumb:hover { background: #484f58; }

    /* ── Search ──────────────────────────────────────────── */
    .search input {
      background: var(--code-bg) !important;
      color: var(--text-color) !important;
      border-color: var(--code-border) !important;
    }
    .search input::placeholder {
      color: var(--blockquote-text) !important;
    }
    .search .matching-post {
      border-bottom-color: var(--sidebar-border) !important;
    }
    /* Search result titles */
    .search .matching-post h2 {
      color: var(--heading-color) !important;
    }
    .search .matching-post h2 a {
      color: var(--link-color) !important;
    }
    /* Search result body text */
    .search .matching-post p {
      color: var(--text-color) !important;
    }
    /* Keyword highlights in search results */
    .search .matching-post p em,
    .sidebar .search .matching-post em {
      color: #ffffff !important;
      background: var(--theme-color) !important;
      font-style: normal !important;
      padding: 1px 4px;
      border-radius: 3px;
      font-weight: 600;
    }
    /* Search clear button */
    .search .clear-button {
      color: var(--text-color) !important;
    }
    /* Search panel background */
    .search {
      background: var(--sidebar-bg) !important;
      border-bottom: 1px solid var(--sidebar-border) !important;
    }

    /* ── Sidebar overrides ──────────────────────────────── */
    .sidebar-nav {
      background: var(--sidebar-bg) !important;
    }
    .sidebar-nav li {
      color: var(--text-color) !important;
    }
    .sidebar-nav > ul > li > p {
      color: var(--heading-color) !important;
      font-weight: 600;
    }
    /* Active sidebar item */
    .sidebar-nav li.active > a {
      color: var(--theme-color) !important;
      font-weight: 600;
      border-right: 3px solid var(--theme-color);
    }

    /* ── Horizontal rules ───────────────────────────────── */
    .markdown-section hr {
      border-color: var(--sidebar-border) !important;
    }

    /* ── GitHub corner (top-right) ──────────────────────── */
    [data-theme="dark"] .github-corner svg {
      fill: var(--sidebar-bg) !important;
      color: var(--bg-color) !important;
    }
    [data-theme="dark"] .github-corner .octo-body,
    [data-theme="dark"] .github-corner .octo-arm {
      fill: var(--text-color) !important;
    }

    /* ── Inline mark/highlight ──────────────────────────── */
    [data-theme="dark"] mark,
    [data-theme="dark"] .markdown-section mark {
      background: #3b2e00 !important;
      color: #ffd866 !important;
      padding: 1px 4px;
      border-radius: 3px;
    }

    /* ── List markers ───────────────────────────────────── */
    .markdown-section ul li,
    .markdown-section ol li {
      color: var(--text-color) !important;
    }

    /* ── Paragraph text (ensure no dark-on-dark) ────────── */
    .markdown-section p {
      color: var(--text-color) !important;
    }

    /* ── Transition smoothing ────────────────────────────── */
    body, .sidebar, .markdown-section, .app-nav,
    .markdown-section pre, .markdown-section code,
    .markdown-section blockquote, .markdown-section table,
    .markdown-section th, .markdown-section td,
    .search, .search input {
      transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Gemini CLI Workshop',
      repo: 'pauldatta/gemini-cli-field-workshop',
      loadSidebar: true,
      loadNavbar: true,
      subMaxLevel: 3,
      fallbackLanguages: ['en'],
      alias: {
        '/([a-z]{2})/_sidebar.md':  '/$1/_sidebar.md',
        '/([a-z]{2})/_navbar.md':   '/_navbar.md',
        '/.*/_sidebar.md':          '/_sidebar.md'
      },
      search: {
        placeholder: 'Search workshop...',
        noData: 'No results.',
        depth: 3
      },
      auto2top: true,
      coverpage: false,
      notFoundPage: true,
      copyCode: {
        buttonText: 'Copy',
        successText: 'Copied!'
      },
      plugins: [
        // i18n link rewriter
        function(hook, vm) {
          hook.beforeEach(function(content) {
            var path = vm.route.path;
            var langMatch = path.match(/^\/([a-z]{2})\//);
            if (langMatch) {
              var lang = langMatch[1];
              return content.replace(/\[([^\]]+)\]\((?!http|\/|#)[^\)]+\.md\)/g, function(match) {
                return match.replace(/\((?!http|\/|#)([^\)]+)\.md\)/, '(/' + lang + '/$1.md)');
              });
            }
            return content;
          });
        },
        // Theme toggle — inject button into navbar
        function(hook) {
          hook.doneEach(function() {
            if (document.getElementById('theme-toggle')) return;
            var nav = document.querySelector('.app-nav');
            if (!nav) return;
            var btn = document.createElement('button');
            btn.id = 'theme-toggle';
            btn.setAttribute('aria-label', 'Toggle dark mode');
            btn.setAttribute('title', 'Toggle dark mode');
            updateToggleText(btn);
            btn.addEventListener('click', function() {
              var current = document.documentElement.getAttribute('data-theme');
              var next = current === 'dark' ? 'light' : 'dark';
              document.documentElement.setAttribute('data-theme', next);
              localStorage.setItem('docsify-theme', next);
              updateToggleText(btn);
            });
            nav.appendChild(btn);
          });
        }
      ]
    };

    function updateToggleText(btn) {
      var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      btn.textContent = isDark ? '☀️ Light' : '🌙 Dark';
    }

    // Apply saved theme or OS preference on load
    (function() {
      var saved = localStorage.getItem('docsify-theme');
      if (saved) {
        document.documentElement.setAttribute('data-theme', saved);
      } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-toml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>
  <script>
    // Language router
    document.addEventListener('click', function(e) {
      var link = e.target.closest('a');
      if (!link) return;
      if (!link.closest('.app-nav')) return;
      var href = link.getAttribute('href');
      if (!href) return;
      var cleanHref = href.replace(/^#/, '');
      if (cleanHref === '/' || /^\/[a-z]{2}\/$/.test(cleanHref)) {
        e.preventDefault();
        e.stopPropagation();
        var currentPath = window.location.hash.replace(/^#/, '');
        if (!currentPath) currentPath = '/';
        var pathWithoutLang = currentPath.replace(/^\/[a-z]{2}\//, '/');
        var newHash = cleanHref === '/' ? pathWithoutLang : cleanHref.replace(/\/$/, '') + pathWithoutLang;
        newHash = newHash.replace(/\/\//g, '/');
        if (!newHash) newHash = '/';
        window.location.hash = '#' + newHash;
      }
    }, true);
  </script>
</body>
</html>
