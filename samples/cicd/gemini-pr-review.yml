name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  id-token: write  # Required for Workload Identity Federation

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Authenticate to Google Cloud via Workload Identity Federation
      # No static API keys — short-lived tokens only
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.SERVICE_ACCOUNT_EMAIL }}

      # Run Gemini CLI as an automated PR reviewer
      - name: Run Gemini CLI Review
        uses: google-github-actions/run-gemini-cli@v1
        with:
          prompt: |
            Review this pull request. Focus on:
            
            1. **Code quality**: readability, naming, duplication
            2. **Security**: SQL injection, XSS, auth bypass, hardcoded secrets
            3. **Architecture**: adherence to the project's GEMINI.md guidelines
            4. **Test coverage**: are there tests for the new/changed code?
            5. **Error handling**: are errors caught and handled appropriately?
            
            Post findings as inline PR review comments with:
            - The specific file and line number
            - A clear description of the issue
            - A concrete fix suggestion
            
            If the PR looks good, post a single approving comment 
            summarizing what was checked.
